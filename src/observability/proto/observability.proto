syntax = "proto3";
package observability;

service ObservabilityService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc GetTaskMetrics (GetTaskMetricsRequest) returns (GetTaskMetricsResponse);
  rpc GetWorkers (GetWorkersRequest) returns (GetWorkersResponse);
  rpc GetWorkerSnapshot (GetWorkerSnapshotRequest) returns (GetWorkerSnapshotResponse);
  rpc WatchWorkerSnapshots (WatchWorkerSnapshotsRequest) returns (stream WorkerSnapshotEvent);
}

message PingRequest {}

message PingResponse {
  uint32 value = 1;
}

message StageKey {
  bytes query_id = 1;
  uint64 stage_id = 2;
  uint64 task_number = 3;
}

// Aggregate metrics for a single task across plans
message TaskMetricsSummary {
  StageKey stage_key = 1;
  uint64 output_rows = 4;
  uint64 elapsed_compute = 5;
  uint64 spill_count = 6;
  uint64 current_memory_usage = 7;
}

message GetTaskMetricsRequest {}

message GetTaskMetricsResponse {
  repeated TaskMetricsSummary task_summaries = 1;
}

message GetWorkerSnapshotRequest {}

message GetWorkerSnapshotResponse {
  WorkerSnapshot snapshot = 1;
}

message WatchWorkerSnapshotsRequest {
  // Desired update interval. The server may clamp this to a safe range.
  uint32 interval_ms = 1;
}

message WorkerSnapshotEvent {
  uint64 sequence = 1;
  bool heartbeat = 2;
  WorkerSnapshot snapshot = 3;
}

message WorkerSnapshot {
  uint64 snapshot_unix_nanos = 1;
  string worker_url = 2;
  repeated bytes active_query_ids = 3;
  uint32 active_tasks = 4;

  // Worker load metrics
  uint64 elapsed_compute_ns_total = 5;
  uint64 build_mem_used_bytes = 6;
  uint64 peak_mem_used_bytes = 7;
  uint64 spill_count = 8;
}

message GetWorkersRequest {}

message WorkerInfo {
  string url = 1;
}

message GetWorkersResponse {
  repeated WorkerInfo workers = 1;
}
